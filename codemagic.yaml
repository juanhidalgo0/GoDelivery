# Codemagic configuration file for Capacitor iOS Build
workflows:
  ios-workflow:
    name: iOS Capacitor Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: GO! Key
    environment:
      groups:
        # Aquí puedes vincular el grupo de variables para credenciales de Apple
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install Node dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web project
        script: |
          npm run build
      - name: Sync Capacitor iOS platform
        script: |
          npx cap sync ios

      - name: Setup keychain and signing certificates
        script: |
          # Inicializa el llavero de Codemagic para firmas digitales
          keychain initialize
          
          # Descarga automáticamente perfiles y certificados usando la API de App Store Connect
          # (Requiere configurar las variables API de Apple en la web de Codemagic)
          app-store-connect fetch-signing-files "com.godelivery.magdalena" --type IOS_APP_STORE --create --certificate-key=@env:CERTIFICATE_PRIVATE_KEY
          
          # Añade los certificados al llavero para la compilación
          keychain add-certificates
          
          # Vincula los perfiles de aprovisionamiento con el proyecto Xcode
          xcode-project use-profiles
      - name: Build iOS Package (.ipa)
        script: |
          # Resuelve las dependencias de Swift Package Manager
          xcodebuild -resolvePackageDependencies -project ios/App/App.xcodeproj -scheme App
          
          # Compila el paquete IPA
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - juanhidalgobaez@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true

<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <script>
    const savedTheme = localStorage.getItem('gd-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description"
    content="GoDelivery — Pedí lo que necesites, lo llevamos a tu puerta. Delivery de comercios locales." />
  <meta name="theme-color" content="#E11D48" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GoDelivery — Delivery a tu puerta</title>
  <link rel="icon" type="image/png" href="/logo-pwa.png" />
  <link rel="apple-touch-icon" href="/logo-pwa.png" />
  <link rel="manifest" href="/manifest.json?v=2" />

  <!-- Preconnect to Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Critical CSS for Splash Screen (Instant Paint) -->
  <style>
    :root {
      --color-primary: #E11D48;
      --color-secondary: #1A1A1A;
      --color-bg: #FFFFFF;
      --font-display: 'Outfit', sans-serif;
    }

    body {
      margin: 0;
      background: var(--color-bg);
    }

    /* Premium Cinematic Blend Background - Starts Red */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #E11D48;
      overflow: hidden;
      transition: background 0.3s ease;
    }

    #app.ready #splash-screen {
      background: transparent !important;
    }

    /* Expanding Morphing White Sphere from Logo Center */
    .splash-circle-grow {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #FFFFFF;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      transform-origin: center;
      animation: expandWhiteCircle 2.2s cubic-bezier(0.85, 0, 0.15, 1) forwards;
      animation-delay: 0.1s;
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #app.ready .splash-circle-grow {
      opacity: 0;
    }

    @keyframes expandWhiteCircle {
      0% {
        transform: translate(-50%, -50%) scale(0);
      }
      100% {
        transform: translate(-50%, -50%) scale(350);
      }
    }

    /* Collapsing Red Sphere from Outside In */
    .splash-circle-red-collapse {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #E11D48;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      transform-origin: center;
      z-index: 2;
      pointer-events: none;
    }

    #app.ready .splash-circle-red-collapse {
      animation: collapseRedCircle 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes collapseRedCircle {
      0% {
        transform: translate(-50%, -50%) scale(350);
      }
      100% {
        transform: translate(-50%, -50%) scale(0);
      }
    }

    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.4s ease 1.2s, visibility 0.4s ease 1.2s;
    }

    /* Expanding Ripple Shockwaves */
    .splash-ripple {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: rippleOut 1.8s cubic-bezier(0.85, 0, 0.15, 1) forwards;
    }

    .splash-ripple.ripple-white {
      border: 2px solid rgba(255, 255, 255, 0.75);
    }

    .splash-ripple.ripple-red {
      border: 2px solid rgba(225, 29, 72, 0.45);
    }

    @keyframes rippleOut {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(4.5);
        opacity: 0;
      }
    }

    .splash-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 1.0s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.0s ease;
      will-change: transform, opacity;
    }

    #app.ready .splash-logo-container {
      animation: logoExit 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    #app.ready .splash-loader-container {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    @keyframes logoExit {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    /* Logo Container - Minimalist & Breathing with red/pink shadow */
    .splash-logo-container {
      position: relative;
      width: 195px;
      height: 195px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 15px 35px rgba(225, 29, 72, 0.25));
      animation: logoEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .splash-logo-img {
      width: 175px;
      height: 175px;
      border-radius: 50%;
      object-fit: cover;
      z-index: 2;
      animation: logoBreathe 3s ease-in-out infinite 0.8s;
    }

    @keyframes logoEntrance {
      0% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes logoBreathe {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 15px 35px rgba(225, 29, 72, 0.15);
      }
      50% {
        transform: scale(1.04);
        box-shadow: 0 25px 50px rgba(225, 29, 72, 0.3);
      }
    }

    /* Spinner & Progress - Brand Red Spinner on White */
    .splash-loader-container {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      animation: fadeIn 0.8s ease 0.3s both;
    }

    .splash-spinner {
      width: 40px;
      height: 40px;
      animation: rotateSpinner 2s linear infinite;
    }

    .splash-spinner .path-bg {
      stroke: #FFE4E6;
    }

    .splash-spinner .path {
      stroke: #E11D48;
      stroke-linecap: round;
      animation: dashSpinner 1.5s ease-in-out infinite;
    }

    @keyframes rotateSpinner {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes dashSpinner {
      0% {
        stroke-dasharray: 1, 150;
        stroke-dashoffset: 0;
      }
      50% {
        stroke-dasharray: 90, 150;
        stroke-dashoffset: -35;
      }
      100% {
        stroke-dasharray: 90, 150;
        stroke-dashoffset: -124;
      }
    }

    /* Dynamic Loading Text - Premium brand red contrast */
    .loading-text-wrapper {
      position: relative;
      height: 20px;
      width: 280px;
      text-align: center;
      overflow: hidden;
    }

    .loading-text {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: #E11D48;
      opacity: 0;
      transform: translateY(12px);
    }

    .loading-text.text-1 {
      animation: sequenceText 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .loading-text.text-2 {
      animation: sequenceText 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      animation-delay: 2s;
    }

    .loading-text.text-3 {
      animation: sequenceText 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      animation-delay: 4s;
    }

    @keyframes sequenceText {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      5%, 28% {
        opacity: 1;
        transform: translateY(0);
      }
      33%, 100% {
        opacity: 0;
        transform: translateY(-12px);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Staggered App Shell Entry Animation */
    #app-header, #app-slider, #app-navbar {
      opacity: 0;
      transform: translateY(20px);
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                  opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
    }

    #app.ready #app-header {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0s;
    }

    #app.ready #app-slider {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.08s;
    }

    #app.ready #app-navbar {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.16s;
    }
  </style>


  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/src/styles/index.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/pages.css" />
  <link rel="stylesheet" href="/src/styles/tracking.css" />
  <link rel="stylesheet" href="/src/styles/chat.css" />
  <link rel="stylesheet" href="/src/styles/product-modal.css" />
  <link rel="stylesheet" href="/src/styles/map-styles.css" />
  <link rel="stylesheet" href="/src/styles/search.css" />
  <link rel="stylesheet" href="/src/styles/onboarding.css" />

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <!-- Google Maps API -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFaOVxf6QfK03rRTVfIH84HLc5Qujzrew&libraries=places"></script>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <script>
    // Bridge for OAuth Redirects (Mercado Pago doesn't like #)
    if (window.location.pathname === '/mp-connect') {
      const params = window.location.search;
      window.location.href = '/#' + window.location.pathname + params;
    }
  </script>
</head>

<body>
  <div id="app">
    <!-- App shell -->
    <header id="app-header"></header>
    <div id="active-order-banner-container"></div>


    <main id="app-slider" class="main-slider">
      <div id="page-home" class="slide-panel"></div>
      <div id="page-commerce" class="slide-panel"></div>
      <div id="page-delivery" class="slide-panel"></div>
      <div id="page-cart" class="slide-panel"></div>
      <div id="page-profile" class="slide-panel"></div>
    </main>
    <div id="app-overlay" class="slide-overlay"></div>



    <!-- Splash / Loading -->
    <div class="splash-screen" id="splash-screen">
      <div class="splash-content">
        <div class="splash-logo-container">
          <!-- Expanding ripple shockwaves & expanding circle inside logo container for perfect centering -->
          <div class="splash-ripple ripple-white" style="animation-delay: 0.1s;"></div>
          <div class="splash-ripple ripple-red" style="animation-delay: 0.7s;"></div>
          <div class="splash-circle-grow"></div>
          <div class="splash-circle-red-collapse"></div>
          <img src="/logo-brand.jpg?v=2" alt="GoDelivery" class="splash-logo-img" />
        </div>
      </div>
    </div>

    <nav id="app-navbar"></nav>
  </div>
  <!-- Toast container -->
  <div id="toast-container"></div>
  <!-- Modal container -->
  <div id="modal-container"></div>
  <div id="notifications-drawer-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
